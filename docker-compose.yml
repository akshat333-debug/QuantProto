services:
  # ── API Server (FastAPI) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantproto-api
    ports:
      - "9000:9000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://quantproto:quantproto@timescaledb:5432/quantproto
      - ALLOWED_ORIGINS=http://localhost:3000,http://dashboard:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - API_KEY=${API_KEY:-}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantproto-net
    restart: unless-stopped

  # ── Dashboard (Next.js) ──────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: quantproto-dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:9000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - quantproto-net
    restart: unless-stopped

  # ── TimescaleDB (PostgreSQL) ────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quantproto-timescaledb
    environment:
      POSTGRES_USER: quantproto
      POSTGRES_PASSWORD: quantproto
      POSTGRES_DB: quantproto
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantproto -d quantproto"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quantproto-net
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantproto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quantproto-net
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────
volumes:
  timescale-data:
    driver: local
  redis-data:
    driver: local

# ── Networks ────────────────────────────────────────────────────
networks:
  quantproto-net:
    driver: bridge
